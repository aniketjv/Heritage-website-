<!DOCTYPE html>
<html>
<head>
<title>Monument Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background-color: #0f0f0f;
    color: #f5f5f5;
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
}

.container {
    width: 85%;
    margin: 40px auto;
}

h1 {
    text-align: center;
    color: #d4af37;
    margin-bottom: 30px;
    font-size: 32px;
}

/* ===== GALLERY ===== */

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    cursor: pointer;
    background: #111;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery-item img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    transition: transform 0.6s ease;
}

.gallery-item:hover {
    transform: translateY(-6px);
    /* box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3); */
}

.gallery-item:hover img {
    transform: scale(1.1);
}

.gallery-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.gallery-item:hover .gallery-overlay {
    opacity: 1;
}

/* INFO SECTION */

.info {
    line-height: 1.8;
    font-size: 17px;
}

.section {
    margin-bottom: 25px;
    background: #1a1a1a;
    padding: 20px;
    border-left: 4px solid #d4af37;
    border-radius: 8px;
}

.section h2 {
    color: #d4af37;
    margin-bottom: 10px;
}

.details p {
    margin: 6px 0;
}

/* BUTTON */

.back {
    display: inline-block;
    margin-top: 40px;
    padding: 10px 22px;
    background: #d4af37;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.back:hover {
    background: #b8962e;
}

@media(max-width:600px){
    h1 { font-size: 24px; }
    .gallery-item img { height: 200px; }
}
</style>
</head>

<body>
