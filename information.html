    <style>
        :root {
            /* Classic Gold & White Theme */
            --charcoalGrey: #384248;
            --primaryColor: #ad8b3a;
            --primaryTextColor: #FFFFFF;
            --highlightedMarkdownBackground: #fff6d7;
            --color-bg-main: #FFFFFF;
            --color-bg-section: #F9F9F9;
            --color-text-main: #45443F;
            --color-text-muted: #60686d;
            --color-border: #E5E5E5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: inherit;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            -webkit-font-smoothing: antialiased;
            color: var(--color-text-main);
            font-family: Inter, InterNeue, Inter Neue, sans-serif;
            font-weight: 400;
            font-size: 1rem;
            line-height: 1.7;
            background-color: var(--color-bg-main);
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
        }

        .logo {
            font-family: 'Prata', serif;
            font-size: 1.5rem;
            color: var(--charcoalGrey);
            text-decoration: none;
        }

        .back-btn {
            text-decoration: none;
            color: var(--charcoalGrey);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--primaryColor);
        }

        /* --- Hero --- */
        .detail-hero {
            height: 60vh;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 4rem 5%;
            margin-top: 60px;
            overflow: hidden;
        }

        .hero-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .tag {
            display: inline-block;
            background-color: var(--primaryColor);
            color: var(--primaryTextColor);
            padding: 5px 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        h1 {
            font-family: 'Prata', serif;
            font-size: 4rem;
            color: var(--charcoalGrey);
            line-height: 1.1;
        }

        /* --- Layout --- */
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 5%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
        }

        /* --- Content --- */
        .main-content h2 {
            font-family: 'Prata', serif;
            font-size: 2rem;
            color: var(--charcoalGrey);
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primaryColor);
            padding-left: 1rem;
        }

        .main-content p {
            margin-bottom: 1.5rem;
            color: var(--color-text-muted);
            font-size: 1.05rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .gallery-item {
            height: 250px;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            filter: grayscale(20%);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        /* --- Sidebar --- */
        .sidebar {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .info-card {
            background-color: var(--color-bg-section);
            border: 1px solid var(--color-border);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .info-card h3 {
            font-family: 'Prata', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--charcoalGrey);
        }

        .info-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 1rem;
        }

        .info-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-icon {
            width: 24px;
            height: 24px;
            fill: var(--primaryColor);
            flex-shrink: 0;
            margin-top: 4px;
        }

        .info-text strong {
            display: block;
            color: var(--charcoalGrey);
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .info-text span {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* --- Reach Section --- */
        .reach-section {
            background-color: #fff;
            border: 1px solid var(--color-border);
            padding: 2rem;
        }

        .transport-mode {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .transport-icon {
            width: 40px;
            height: 40px;
            background-color: var(--primaryColor);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .transport-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* --- Map --- */
        .map-container {
            height: 250px;
            margin-top: 2rem;
            position: relative;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;

            /* Background Image */
            background-image: url("https://i.pinimg.com/1200x/fa/3b/f1/fa3bf1463710297d6031b522e0baf7ef.jpg");
            background-size: cover;
            /* Makes image cover full container */
            background-position: center;
            /* Center image */
            background-repeat: no-repeat;
            /* Prevent repeating */
        }

        .btn-map {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primaryColor);
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: background 0.3s;
            bottom: 15px;
            left: 50%;
        }

        */ .btn-map:hover {
            background-color: var(--charcoalGrey);
        }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .detail-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                order: -1;
            }

            h1 {
                font-size: 2.5rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                history: "Vishalgad (also known as Khelna) is a hill fort located in Bhudargad of Kolhapur district, Maharashtra, India. The fort was built by the last Shilahara ruler Bhoja II between 1178 and 1209 CE. In 1216, it was captured by the Yadava ruler Simhana II after the defeat of the Shilahara forces, leading to the annexation of the Shilahara kingdom into the Yadava state.After the decline of the Yadava dynasty, control of the fort passed to the Surves, a Suryavanshi dynasty that had migrated from Saurashtra to the Konkan region and established its kingdom there. In 1471, the Bahamani general Mahmud Gawan laid siege to Vishalgad, compelling the Surves to surrender the fort. Owing to its strategic location, Vishalgad subsequently became a focal point of several military conflicts in the Deccan, involving the Bahamani Sultanate, the Vijayanagara Empire, the Surves, and later the Adil Shahi dynasty, Mughals and the Marathas.         ",

                history: "Deogiri, later known as Daulatabad, stands as a testament to the grandeur and turbulence of medieval Indian history. Originally constructed in the 12th century by Bhillama V of the Yadava dynasty, the fort quickly became the capital of the Yadava kingdom, owing to its formidable defenses and strategic location along vital trade routes. Its commanding position made it a sought-after stronghold, attracting the ambitions of successive rulers and empires. However, the most dramatic episode in its history unfolded in 1327 when Sultan Muhammad bin Tughluq of the Delhi Sultanate embarked on a radical experiment—shifting his entire capital from Delhi to Daulatabad. Renaming it the “City of Fortune,” he forcibly relocated the entire population of Delhi to this new capital in an attempt to centralize power. However, logistical challenges, lack of resources, and local resistance led to the failure of this ambitious plan, and within a few years, the capital was reverted to Delhi, leaving Daulatabad a symbol of an abandoned dream. Following this period, the fort changed hands multiple times, first falling to the Bahmani Sultanate and later becoming a prized possession of the Nizam Shahis of Ahmadnagar. By the 17th century, it was conquered by the Mughals, who reinforced its defenses before it eventually came under the control of the Marathas. Each of these rulers left their mark on Daulatabad, enhancing its military architecture and making it one of the most formidable fortresses in India. Today, the fort remains an enduring symbol of power, ambition, and the rise and fall of dynasties.",

                history: "The Elephanta Caves form a collection of cave temples predominantly dedicated to the Hindu god Shiva; UNESCO has designated them as a World Heritage Site.They are located on Elephanta Island, or Gharapuri (literally meaning the city of the caves),in Mumbai Harbour, 10 kilometres (6.2 mi) east of Mumbai in the Indian state of Maharashtra. The island, about 2 kilometres (1.2 mi) west of the Jawaharlal Nehru Port, features five Hindu caves, a few Buddhist stupa mounds that date back to the 2nd century BCE,and two Buddhist caves with water tanks.The Elephanta Caves contain rock-cut stone sculptures, mostly in high relief, that show a syncretism of Hindu—Buddhist ideas and iconography. The caves are hewn from solid basalt rock. Apart from a few exceptions, much of the artwork has been defaced and damaged.The main temples orientation as well as the relative location of other temples form a mandala pattern.[6] The carvings narrate Hindu legends, with the large monolithic 5.45 metres (17.9 ft) Trimurti Sadashiva (three-faced Shiva), Nataraja (Lord of the dance) and Yogishvara (Lord of Yogis) being the most celebrated.These date to the between the 5th and 9th centuries CE, and scholars attribute them to various Hindu dynasties. They are most commonly placed between the 5th and 7th centuries. Many scholars consider them to have been completed by about 550 CE.",

                history: "The Karla Caves, Karli Caves, Karle Caves or Karla Cells, are a complex of ancient Buddhist Indian rock-cut caves at Karli near Lonavala, Maharashtra. It is just 10.9 Kilometers away from Lonavala. Other caves in the area are Bhaja Caves, Patan Buddhist Cave, Bedse Caves and Nasik Caves. The shrines were developed over the period from the 2nd century BCE to the 5th century CE. The oldest of the cave shrines is believed to date back to 160 BCE, having arisen near a major ancient trade route, running eastward from the Arabian Sea into the Deccan.The group at Karla is one of the older and smaller of the many rock-cut Buddhist sites in Maharashtra. It is one of the best-known because of the famous Grand Chaitya (Cave 8), the largest and most completely preserved chaitya hall of the period, containing unusual quantities of fine sculpture on a large scale.Many traders, Western Satraps of Saka origin and Satavahana rulers made grants for construction and support of these caves. Karla's location in Maharashtra places it in a region that marks the division between North India and South India.",

                image: "https://i.pinimg.com/736x/e2/7c/4b/e27c4be1094d90e07183bafe2e0730b1.jpg",
                history: "Bhaja Caves are a group of 22 rock-cut caves dating back to the 2nd century BC located off the Mumbai - Pune expressway near the city of Pune, India. The caves are 400 feet above the village of Bhaja,on an important ancient trade route running from the Arabian Sea eastward into the Deccan Plateau (the division between North India and South India).The inscriptions and the cave temple are protected as a Monument of National Importance, by the Archaeological Survey of India per Notification No. 2407-A.[5][6] It belongs to the Early Buddhist schools in Maharashtra.The caves have a number of stupas, one of their significant features. The most prominent excavation is its chaitya (or chaityagrha – Cave XII), a good example of the early development of this form from wooden architecture, with a vaulted horseshoe ceiling. Its vihara (Cave XVIII) has a pillared verandah in front and is adorned with unique reliefs.[7] These caves are notable for their indications of the awareness of wooden architecture.[2] The carvings prove that tabla – a percussion instrument – was used in India for at least 2300 years,[8][9] disproving the centuries-held belief that the tabla was introduced to India by outsiders or from Turko-Arab.The carving shows a woman playing tabla and another woman dancing.",

                image: "https://i.pinimg.com/736x/90/22/c0/9022c0e9125b1cac725a7b73fe2de9d7.jpg",
                history: "The Kanheri Caves (Kānherī-guhā [kaːnʱeɾiː ɡuɦaː]) are a group of caves and rock-cut monuments, cut into a massive basalt outcrop in the forests of the Sanjay Gandhi National Park, on the island of Salsette in the western outskirts of Mumbai, India. They contain Buddhist sculptures and relief carvings, paintings and inscriptions, dating from the 1st century CE[1] to the 10th century CE. Kanheri comes from the Sanskrit Krishnagiri, which means black mountain.The site is on a hillside, and is accessible via rock-cut steps. The cave complex comprises one hundred and nine caves. The oldest are relatively plain and unadorned, in contrast to later caves on the site or the highly embellished Elephanta Caves of Mumbai. Each cave has a stone plinth that functioned as a bed. A congregation hall with huge stone pillars contains a stupa (a Buddhist pagoda). Rock-cut channels above the caves fed rainwater into cisterns, which provided the complex with water. Once the caves were converted to permanent monasteries, their walls were carved with intricate reliefs of the Buddha and bodhisattvas. The Kanheri caves were built in the 1st century and had become an important Buddhist settlement on the Konkan coast by the 3rd century CE.",

                history: "Grishneshwar Temple is one of the 12 Jyotirlingas of Lord Shiva. Located near Ellora Caves, it was rebuilt in the 18th century by Ahilyabai Holkar.The temple structure was destroyed by the Delhi Sultanate in 13th and 14th centuries. The temple went through several rounds of rebuilding followed by re-destruction during the Mughal-Maratha conflict. Maloji Bhosale (grandfather of Shivaji) first restored it in the 16th century and rebuilt it to its current form in the year 1729, under the sponsorship of queen Gautama Bai Holkar of Indore, after the fall of the Mughal Empire.[6][8][9] It is presently an important and active pilgrimage site of the Hindus and attracts long lines of devotees daily. Anyone can enter the temple premises and its inner chambers, but to enter the sanctum sanctorum (garbha-gruha) of the temple, the local Hindu tradition demands that men must go bare-chested.",

                image: "https://i.pinimg.com/1200x/0a/34/51/0a3451f56a5be386b187123c0cbdf5af.jpg",
                history: "Visapur Fort is located near Lohagad Fort and was built during the Maratha Empire. It was built during 1713-1720 CE by Balaji Vishwanath, the first Peshwa of Maratha Empire.[1][2] Visapur fort was built much later than Lohagad but the histories of the two forts are closely linked.Sunlit view of Visapur Fort .In 1818, when reducing the Peshwa's forts, the strength of Lohagad and its fame as the treasury of the Maratha kingdom, caused the English to make special preparations for its attack. A detachment of 380 European and 800 native soldiers, with a battering train, summoned from Konkan, were joined by artillery from Chakan, and two other British battalions. On 4 March 1818, Visapur was attacked and occupied.Making use of its higher elevation and proximity to Lohagad, the British troops set up their cannons on Visapur and bombarded Lohagad, forcing the Marathas to flee. Thus, in 1818, Lohagad-Visapur was taken over by the British in 1818 AD and placed under the command of a Colonel Prother.Considering, the strategic importance of Visapur, both the north (Konkan) and the south (Deccan) gateways were blown up, and except a few huts, nothing was left standing.In contrast, most of Lohagad fort is still intact",

                image: "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/11/33/f7/cb/img-20171024-141916091.jpg?w=1200&h=1200&s=1",
                history: "The fort is quite ancient. Remnants of Microlithic man have been discovered here. The various Puranas (ancient scriptures) like Matsyapurana, Agnipurana and Skandapurana include many references about Harishchandragad. Its origin is said to have been in the 6th century, during the rule of Kalachuri dynasty. The citadel was built during this era. The various caves probably have been carved out in the 11th century. In these caves are idols of Lord Vishnu. Though the cliffs are named Taramati and Rohidas, they are not related to Ayodhya. Great sage Changdev (one who created the epic Tatvasaar), used to meditate here in the 14th century. The caves are from the same period. The various constructions on the fort and those existing the surrounding region point to the existence of diverse cultures here. The carvings on the temples of Nageshwar (in Khireshwar village), in the Harishchandreshwar temple and in the cave of Kedareshwar indicate that the fort belongs to the medieval period, since it is related to mahadeva as a totem of tribes Mahadev Koli. They were controlling the fort before Moguls. Later the fort was under the control of Moguls. The Marathas captured it in 1747.",

            {
                id: 57,
                name: "Salher Fort",
                image: "https://i.pinimg.com/1200x/51/08/9a/51089a7a513078e1957d8c162b36e776.jpg",
                history: "Salher Fort is the highest fort in Maharashtra and site of the famous Battle of Salher in 1672 between Marathas and Mughals.Salher Fort was under Shrimant Sardar Suryajirao Kakade in 1671. The Mughals attacked the fort in 1672. Almost one lakh soldiers fought in this war.[1] Many soldiers died in this battle but finally Chhatrapati Shivaji Maharaj sent Suryajirao Kakade who won the Battle of Salher. Of all the face to face battles between the Mughals and Suryajirao Kakade's troops, the battle of Salher takes first place. After winning Salher, the Marathas also captured Mulher and established their reign over the Baglan region. In the 18th century, the Peshwas occupied this fort and later by the British.The Marathas defeated the Mughals at the Battle of Salher in 1672.",

                history: "Junnar has been an important trading and political centre for the last two millennia. The town is on the trade route that links the ports of western India or more specifically of Konkan with Deccan interiors. The first mention of Junnar comes the Greco-Roman travellers from the first millennium,[3][4][5] The Indo-Scythian Western Satraps ruled at Junnar during the 2nd century CE as shown by their cave inscriptions in the area of Junnar, at Manmodi Caves.Yavana Greeks also left donative inscriptions in the 2nd century CE at Lenyadri and Manmodi Caves. According to Damodar Kosambi, the real name of Junnar may have been Tagara. In his opinion, the name Junnar may be the contracted form of Jirnanagar (Old city).In the 1400s, the Russian traveler, Afanasy Nikitin spent many months in Junnar during the monsoon season. He describes vividly the life in the Bahamani-ruled area around Junnar.After the collapse of the Bahamanis, the breakaway state of Nizam Shahi had Junnar as their first capital in the 1490s.Later in early 1600s, Malik Ambar the Nizam Shahi general again moved his capital there.[11] The father of Shivaji, Shahaji Raje Bhonsale worked for Malik Ambar early in his career. Shivaji was born at the nearby Shivneri fort.",

                history: "This famous landmark which has become a symbol of the city, was built as the headquarters of the Great Indian Peninsular Railway.The railway station was built to replace the Bori Bunder railway station, in the Bori Bunder area of Bombay, a prominent port and warehouse area known for its imports and exports. Since Bombay became a major port city at the time, a bigger station was built to meet its demands, and was named Victoria Terminus, after the then reigning Empress of India, Queen Victoria. The station was designed by Frederick William Stevens, a British engineer architect, attached to the Bombay office of the Indian colonial Public Works Department. Work began in 1878. He received ₹1,614,000 (US$19,000) as the payment for his services.[1] Stevens earned the commission to construct the station after a masterpiece watercolour sketch by draughtsman Axel Haig.[1] The design has been compared to George Gilbert Scott's 1873 St Pancras railway station in London, also in an exuberant Italian Gothic style, but it is far closer to[1][16] Scott's second prize winning entry for Berlin's parliament building, exhibited in London in 1875, which featured numerous towers and turrets, and a large central ribbed dome.[17] The style of the station is also similar to other public buildings of the 1870s in Mumbai, such as Elphinstone College but especially the buildings of Mumbai University, also designed by G Scott.",

                history: "The elaborate palace was built in the Pune jagir by the then jagirdar and future mentor of Chhatrapati Shivaji Maharaj, Dadoji Kondadeo in the year 1630 AD with the idea of rejuvenating the recently razed city of Pune.He obtained proper permissions from Shahaji, who was then serving the Ahmadnagar Sultanate and hence had jurisdiction over the region.Thus another purpose served by the Mahal was raising Shahaji's son, Shivaji. Young Shivaji grew up here, and stayed in the Lal Mahal with his mother Jijabai till he captured the Torna fort in 1645. Shivaji's marriage with his first wife, Saibai took place in Lal Mahal on 16 May 1640.The Lal Mahal is also famous for an encounter between Shivaji and Shaista Khan where Shivaji cut off four fingers of the latter's when he was trying to escape from the first-floor window of the Lal Mahal.This was part of a surreptitious guerrilla attack on the massive and entrenched Mughal Army that had camped in Pune, with Shaista occupying (possibly symbolically) Shivaji's childhood home. As a punishment for the ignominy of the defeat despite superior numbers and better armed and fed soldiers, Shaista was transferred by the Mughal Emperor Aurangzeb to Bengal.",

                image: "https://www.trawell.in/admin/images/upload/04372149Ratnagiri_Vijaydurg_Fort_Main.jpg",
                history: "In 1653, Chatrapati Shivaji Maharaj captured this fort from Adil Shah of Bijapur and renamed it as Vijay Durg. The original name of the fort was Gheria and the first fortification appears to have been constructed in 1200 during the regime of Raja Bhoj II. Chatrapati Shivaji Maharaj developed Vijaydurg as an important base for Maratha warships.Maratha Empire looked to be in a decline after the death of chatrapati Shivaji Maharaj in 1680, when his son and successor Sambhaji was captured by Mughal Emperor Aurangzeb and brutally tortured to death on 21 March 1689. Later in that year, the fort of Raigad fell in the hand of Mughals. Wife of Shambhaji Maharaj and his infant son Shahu Maharaj along with many others were captured and were treated as state prisoners.Shivaji Maharaj's second wife's son Raja Ram then took in charge of the Maratha Empire. Inspired by the valiant death of Shambhaji Maharaj, they fought back against the Mughals. It was during his reign Kanhoji Angre alias Conajee Angria became admiral of naval army of the Marathas. In 1698, Kanhoji made Vijaydurg the capital of his territory along the coast.",

        // COMBINE REAL AND PLACEHOLDER DATA

        // ---------------------------------------------------------

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const placeId = parseInt(params.get('id')); // Get ID from URL (e.g., ?id=1)

            // Find the place in our array
            const place = allPlaces.find(p => p.id === placeId);

            if (place) {
                // Update Hero
                document.getElementById('hero-title').innerText = place.name;
                // document.getElementById('hero-tag').innerText = place.tag;
                document.getElementById('hero-image').src = place.image;
                document.title = place.name + " - Maharashtra Heritage";

                // Update Content
                document.getElementById('content-history').innerText = place.history;

                // Update Sidebar
                document.getElementById('info-location').innerText = place.location;
                document.getElementById('info-time').innerText = place.bestTime;
                document.getElementById('info-fee').innerText = place.fee;
                document.getElementById('reach-air').innerText = place.air;
                document.getElementById('reach-train').innerText = place.train;
                document.getElementById('reach-road').innerText = place.road;

                // Update Gallery
                const galleryGrid = document.getElementById('gallery-grid');
                galleryGrid.innerHTML = ''; // Clear loading text
                place.gallery.forEach(imgUrl => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `<img src="${imgUrl}" alt="${place.name}">`;
                    galleryGrid.appendChild(div);
                });

                document.getElementById('hero-title').innerText = "Place Not Found";
