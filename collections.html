    <style>
        :root {
              /* --color-bg-dark: #0C0A09;   */
             --color-bg-light: #F0EBE3;
             --primaryColor: #ad8b3a;
             /* background: rgba(173, 139, 58, 0.2); */
            --color-accent: #B45309;
            --color-accent-light: #D97706;
            --color-text-light: #FAFAF9;
            --color-text-dark:var(--color-accent);
            --color-text-muted: #A8A29E;
        } 

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-dark);
            color: var(--color-text-light);
            overflow-x: hidden;
        }

       
           /* --- Header / Navigation --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
        }

        .logo {
            font-family: 'Prata', serif;
            font-size: 1.8rem;
            /* color: var(--charcoalGrey); */
            letter-spacing: 1px;
            text-decoration: none;
            font-weight: bold;
              background-clip: text;
            color: transparent;
            background-image: url("https://i.pinimg.com/736x/6f/6e/df/6f6edf1e9ee5b47570d4b03eb71d81f1.jpg");
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-menu a {
            color: black;
            text-decoration: none;
            font-size:15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            padding: 5px 0;
            transition: color 0.3s ease;
            right:0;
            
        }

        .nav-menu a:hover {
            color: var(--primaryColor);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--primaryColor);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        /* --- Hero Header --- */
        .collections {
            padding-top: 160px; /* Space for navbar */
            padding-bottom: 60px;
            text-align: center;
            position: relative;
        }

        .collections h1 {
            font-family: 'Prata', serif;
            font-size: 3.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            color:  #3b1f14 !important;
            -webkit-background-clip: text;
            /* -webkit-text-fill-color: transparent; */
            margin-bottom: 1rem;
        }

        .collections p {
            color: var(--color-text-muted);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* --- Filters Section --- */
        .filters-section {
            padding: 2rem 0 4rem 0;
        }
       #categoryFilter ,#districtFilter{
    background-color: #B45309 !important; /* heritage brown */
    color: white;
    border: 1px solid #B45309;
}

        .form-control, .form-select {
            /* background-color: rgba(255, 255, 255, 0.05); */
            background-color:#B45309 !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-light);
            padding: 14px 20px;
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }


        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: var(--color-accent);
            box-shadow: none;
            color: var(--color-text-light);
        }

        .form-control::placeholder {
            color: var(--color-text-muted);
        }

        

        /* --- Artifact Cards --- */
        .artifact-card {
             /* background-color: rgba(255, 255, 255, 0.02);  */
              background: white;
             /* background: #3b1f14ce; */
             border: 1px solid  #B45309;
            overflow: hidden;
            position: relative;
            height: 100%;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

         .artifact-card:hover {
             /* transform: translateY(-8px);
            border-color: var(--color-accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); */
           
    transform: translateY(-10px);
    border-color: var(--color-accent);
    box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.463),
        0 0 20px rgba(212,175,55,0.25);
} 

        

        .card-img-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .artifact-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.6s ease;
            /* filter: grayscale(100%) contrast(1.1); */
            opacity: 0.9;
        }

        .artifact-card:hover img {
            transform: scale(1.08);
            filter: grayscale(0%) contrast(1);
            opacity: 1;
        }

        .card-body {
            padding: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-family: 'Prata', serif;
            font-size: 1.2rem;
            /* color: var(--color-text-light); */
            color: black;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .card-location {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--color-accent-light);
            margin-bottom: 1.5rem;
        }

        /* --- Button Style --- */
        .btn-heritage {
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--color-text-light);
            background-color: var(--color-accent);
            /* background: transparent; */
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            margin-top: auto; /* Push to bottom */
        }

        /* .btn-heritage::before {
            content: '';

        .btn-heritage:hover {

             border-color: var(--color-accent); 
        }

        .btn-heritage:hover::before {
            width: 100%;
        } */

        /* --- No Results --- */
        .no-results {
            text-align: center;
            padding: 4rem 0;
            color: var(--color-text-muted);
        }

        /* --- Footer --- */
        .footer-simple {
            margin-top: 6rem;
            padding: 3rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .footer-simple p {
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }
        
        /* --- Mobile Adjustments --- */
        @media (max-width: 768px) {
            .collections-header h1 {
                font-size: 2.5rem;
            }
            .artifact-card img {
                filter: grayscale(0%); /* Color on mobile by default */
                opacity: 0.9;
            }
        }

const grid = document.getElementById("collectionGrid");

// 🖼 Display Function
function displayArtifacts(data){
  grid.innerHTML = "";

  if(data.length === 0){
    grid.innerHTML = "<div class='col-12 no-results'><h3>No monuments found</h3><p>Try adjusting your filters.</p></div>";
    return;
  }

  data.forEach(item => {
    const card = `
      <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
        <div class="card artifact-card">
          <div class="card-img-wrapper">
            <img src="${item.image}" class="card-img-top" alt="${item.title}">
          </div>
          <div class="card-body">
            <h5 class="card-title">${item.title}</h5>
            <div class="card-location">${item.district}</div>
            <a href="information.html?id=${item.id}" class="btn-heritage">View Details</a>
          </div>
        </div>
      </div>
    `;
    grid.innerHTML += card;
  });
}


// 🔎 Combined Filter Function
function applyFilters(){
  const searchValue = document.getElementById("searchInput").value.toLowerCase();
  const categoryValue = document.getElementById("categoryFilter").value;
  const districtValue = document.getElementById("districtFilter").value;

  const filtered = artifacts.filter(item => {
    const matchesSearch = item.title.toLowerCase().includes(searchValue);
    const matchesCategory = categoryValue === "all" || item.category === categoryValue;
    const matchesDistrict = districtValue === "all" || item.district === districtValue;

    return matchesSearch && matchesCategory && matchesDistrict;
  });

  displayArtifacts(filtered);
}

// Initial Load
displayArtifacts(artifacts);

// Event Listeners
document.getElementById("searchInput").addEventListener("keyup", applyFilters);
document.getElementById("categoryFilter").addEventListener("change", applyFilters);
document.getElementById("districtFilter").addEventListener("change", applyFilters);

</script>
